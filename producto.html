<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Producto — Impresión 3D</title>
<meta property="og:type" content="product">
<meta property="og:site_name" content="rems. · Impresión 3D">
<meta id="og-title" property="og:title" content="Producto">
<meta id="og-description" property="og:description" content="">
<meta id="og-image" property="og:image" content="">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #E8E6E1;
    --bg2: #DEDAD4;
    --border: #C8C4BC;
    --text: #111111;
    --muted: #888880;
    --green: #2A6B3A;
    --red: #8B2020;
    --white: #F2F0EB;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; min-height:100vh; }
  .container { max-width:900px; margin:0 auto; padding:0 32px; }

  header { padding:32px 0 24px; border-bottom:2px solid var(--text); margin-bottom:48px; }
  .header-inner { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
  .brand { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:36px; text-transform:uppercase; text-decoration:none; color:var(--text); }
  .btn-back { display:inline-flex; align-items:center; gap:6px; color:var(--muted); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; text-decoration:none; transition:color 0.15s; }
  .btn-back:hover { color:var(--text); }

  /* Product layout */
  .product-wrap { display:grid; grid-template-columns:1fr 1fr; gap:48px; margin-bottom:64px; align-items:start; }

  /* Image */
  .product-img-wrap { width:100%; aspect-ratio:1/1; background:var(--white); border:1px solid var(--border); overflow:hidden; display:flex; align-items:center; justify-content:center; cursor:zoom-in; position:relative; }
  .product-img-wrap img { width:100%; height:100%; object-fit:cover; transition:transform 0.3s; }
  .product-img-wrap:hover img { transform:scale(1.04); }
  .product-img-placeholder { font-size:64px; opacity:0.2; }
  .badge-new { position:absolute; top:14px; left:14px; background:#E63946; color:#fff; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; padding:4px 10px; }

  /* Info */
  .product-info { display:flex; flex-direction:column; gap:0; }
  .product-tag { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
  .product-name { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:clamp(32px,5vw,52px); text-transform:uppercase; line-height:0.95; margin-bottom:20px; }
  .product-desc { font-size:14px; color:var(--muted); line-height:1.7; margin-bottom:24px; }

  .product-divider { border:none; border-top:1px solid var(--border); margin:20px 0; }

  .product-price-row { display:flex; align-items:baseline; gap:12px; margin-bottom:8px; flex-wrap:wrap; }
  .price-original { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:28px; color:var(--muted); text-decoration:line-through; line-height:1; }
  .price-discount-badge { background:#E63946; color:#fff; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; padding:3px 9px; align-self:center; }
  .price-expiry { font-size:10px; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:16px; }
  .price-label { font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); }
  .price-val { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:48px; color:var(--green); line-height:1; }

  .stock-badge { display:inline-block; font-size:10px; text-transform:uppercase; letter-spacing:0.12em; font-weight:600; padding:4px 10px; margin-bottom:24px; }
  .stock-en-stock { background:#EAF3EC; color:#2A6B3A; }
  .stock-sin-stock { background:#FFEBEE; color:#8B2020; }

  /* Buttons */
  .btn-wsp { display:flex; align-items:center; justify-content:center; gap:8px; background:#25D366; color:#fff; border:none; width:100%; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; letter-spacing:0.08em; text-transform:uppercase; padding:14px; cursor:pointer; text-decoration:none; transition:background 0.15s; margin-bottom:10px; }
  .btn-wsp:hover { background:#1da851; }
  .btn-wsp svg { width:18px; height:18px; fill:#fff; }

  .btn-share { display:flex; align-items:center; justify-content:center; gap:7px; background:transparent; border:1px solid var(--border); color:var(--muted); font-family:'Barlow',sans-serif; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; padding:11px; cursor:pointer; width:100%; transition:all 0.15s; }
  .btn-share:hover { border-color:var(--text); color:var(--text); }
  .btn-share svg { width:14px; height:14px; fill:currentColor; }

  /* Related */
  .related-section { border-top:2px solid var(--text); padding-top:12px; margin-bottom:24px; }
  .related-title { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:36px; text-transform:uppercase; margin-bottom:24px; }
  .related-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--border); border:1px solid var(--border); margin-bottom:64px; }
  .related-card { background:var(--white); padding:20px 16px; text-decoration:none; color:var(--text); transition:background 0.15s; display:block; }
  .related-card:hover { background:var(--bg2); }
  .related-img { width:100%; aspect-ratio:4/3; background:var(--bg); margin-bottom:12px; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .related-img img { width:100%; height:100%; object-fit:cover; }
  .related-name { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; text-transform:uppercase; line-height:1.1; margin-bottom:8px; }
  .related-price { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:20px; color:var(--green); }

  /* Toast */
  .share-toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--text); color:var(--white); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; padding:10px 20px; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:300; }
  .share-toast.show { opacity:1; }

  /* Lightbox */
  .lightbox-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:500; display:flex; align-items:center; justify-content:center; padding:24px; opacity:0; pointer-events:none; transition:opacity 0.2s; cursor:zoom-out; }
  .lightbox-overlay.open { opacity:1; pointer-events:all; }
  .lightbox-overlay img { max-width:90vw; max-height:90vh; object-fit:contain; transform:scale(0.92); transition:transform 0.2s; cursor:default; }
  .lightbox-overlay.open img { transform:scale(1); }
  .lightbox-close { position:fixed; top:20px; right:24px; color:#fff; font-size:32px; cursor:pointer; line-height:1; opacity:0.7; transition:opacity 0.15s; background:none; border:none; }
  .lightbox-close:hover { opacity:1; }

  /* Loading */
  .loading { text-align:center; padding:80px 0; color:var(--muted); font-size:12px; letter-spacing:0.12em; text-transform:uppercase; }
  .not-found { text-align:center; padding:80px 0; }
  .not-found p { color:var(--muted); margin-bottom:24px; }

  footer { border-top:1px solid var(--border); padding:24px 0; color:var(--muted); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; }

  @media(max-width:640px) {
    .product-wrap { grid-template-columns:1fr; gap:24px; }
    .related-grid { grid-template-columns:1fr 1fr; }
    .price-val { font-size:40px; }
  }

/* ── THEME SWITCH (uiverse Galahhad) ── */
.theme-switch {
  --toggle-size: 20px;
  --container-width: 5.625em;
  --container-height: 2.5em;
  --container-radius: 6.25em;
  --container-light-bg: #3D7EAE;
  --container-night-bg: #1D1F2C;
  --circle-container-diameter: 3.375em;
  --sun-moon-diameter: 2.125em;
  --sun-bg: #ECCA2F;
  --moon-bg: #C4C9D1;
  --spot-color: #959DB1;
  --circle-container-offset: calc((var(--circle-container-diameter) - var(--container-height)) / 2 * -1);
  --stars-color: #fff;
  --clouds-color: #F3FDFF;
  --back-clouds-color: #AACADF;
  --transition: .5s cubic-bezier(0, -0.02, 0.4, 1.25);
  --circle-transition: .3s cubic-bezier(0, -0.02, 0.35, 1.17);
}
.theme-switch, .theme-switch *, .theme-switch *::before, .theme-switch *::after { box-sizing:border-box; margin:0; padding:0; font-size:var(--toggle-size); }
.theme-switch__container { width:var(--container-width); height:var(--container-height); background-color:var(--container-light-bg); border-radius:var(--container-radius); overflow:hidden; cursor:pointer; box-shadow:0em -0.062em 0.062em rgba(0,0,0,.25),0em 0.062em 0.125em rgba(255,255,255,.94); transition:var(--transition); position:relative; }
.theme-switch__container::before { content:""; position:absolute; z-index:1; inset:0; box-shadow:0em 0.05em 0.187em rgba(0,0,0,.25) inset,0em 0.05em 0.187em rgba(0,0,0,.25) inset; border-radius:var(--container-radius); }
.theme-switch__checkbox { display:none; }
.theme-switch__circle-container { width:var(--circle-container-diameter); height:var(--circle-container-diameter); background-color:rgba(255,255,255,.1); position:absolute; left:var(--circle-container-offset); top:var(--circle-container-offset); border-radius:var(--container-radius); box-shadow:inset 0 0 0 3.375em rgba(255,255,255,.1),inset 0 0 0 3.375em rgba(255,255,255,.1),0 0 0 0.625em rgba(255,255,255,.1),0 0 0 1.25em rgba(255,255,255,.1); display:flex; transition:var(--circle-transition); pointer-events:none; }
.theme-switch__sun-moon-container { pointer-events:auto; position:relative; z-index:2; width:var(--sun-moon-diameter); height:var(--sun-moon-diameter); margin:auto; border-radius:var(--container-radius); background-color:var(--sun-bg); box-shadow:0.062em 0.062em 0.062em 0em rgba(254,255,239,.61) inset,0em -0.062em 0.062em 0em #a1872a inset; filter:drop-shadow(0.062em 0.125em 0.125em rgba(0,0,0,.25)) drop-shadow(0em 0.062em 0.125em rgba(0,0,0,.25)); overflow:hidden; transition:var(--transition); }
.theme-switch__moon { transform:translateX(100%); width:100%; height:100%; background-color:var(--moon-bg); border-radius:inherit; box-shadow:0.062em 0.062em 0.062em 0em rgba(254,255,239,.61) inset,0em -0.062em 0.062em 0em #969696 inset; transition:var(--transition); position:relative; }
.theme-switch__spot { position:absolute; top:0.75em; left:0.312em; width:0.75em; height:0.75em; border-radius:var(--container-radius); background-color:var(--spot-color); box-shadow:0em 0.0312em 0.062em rgba(0,0,0,.25) inset; }
.theme-switch__spot:nth-of-type(2) { width:0.375em; height:0.375em; top:0.937em; left:1.375em; }
.theme-switch__spot:nth-last-of-type(3) { width:0.25em; height:0.25em; top:0.312em; left:0.812em; }
.theme-switch__clouds { width:1.25em; height:1.25em; background-color:var(--clouds-color); border-radius:var(--container-radius); position:absolute; bottom:-0.625em; left:0.312em; box-shadow:0.937em 0.312em var(--clouds-color),-0.312em -0.312em var(--back-clouds-color),1.437em 0.375em var(--clouds-color),0.5em -0.125em var(--back-clouds-color),2.187em 0 var(--clouds-color),1.25em -0.062em var(--back-clouds-color),2.937em 0.312em var(--clouds-color),2em -0.312em var(--back-clouds-color),3.625em -0.062em var(--clouds-color),2.625em 0em var(--back-clouds-color),4.5em -0.312em var(--clouds-color),3.375em -0.437em var(--back-clouds-color),4.625em -1.75em 0 0.437em var(--clouds-color),4em -0.625em var(--back-clouds-color),4.125em -2.125em 0 0.437em var(--back-clouds-color); transition:0.5s cubic-bezier(0,-0.02,0.4,1.25); }
.theme-switch__stars-container { position:absolute; color:var(--stars-color); top:-100%; left:0.312em; width:2.75em; height:auto; transition:var(--transition); }
.theme-switch__checkbox:checked + .theme-switch__container { background-color:var(--container-night-bg); }
.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__circle-container { left:calc(100% - var(--circle-container-offset) - var(--circle-container-diameter)); }
.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__circle-container:hover { left:calc(100% - var(--circle-container-offset) - var(--circle-container-diameter) - 0.187em); }
.theme-switch__circle-container:hover { left:calc(var(--circle-container-offset) + 0.187em); }
.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__moon { transform:translate(0); }
.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__clouds { bottom:-4.062em; }
.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__stars-container { top:50%; transform:translateY(-50%); }

/* ── DARK MODE ── */
body.dark {
  --bg: #0F0F0E;
  --bg2: #1A1A18;
  --border: #2A2A28;
  --text: #F0EDE8;
  --muted: #6A6860;
  --white: #1A1A18;
  --card-bg: #1A1A18;
}
body.dark nav { background:rgba(15,15,14,0.95); }
body.dark .announce { background:#0A0A09; }
body.dark footer { background:#0A0A09; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-inner">
      <a href="catalogo.html" class="brand">CATÁLOGO</a>
      <a href="catalogo.html" class="btn-back">← Volver al catálogo</a>
    </div>
  </header>

  <div id="content"><div class="loading">Cargando producto…</div></div>
</div>

<footer>
  <div class="container">rems. · Impresión 3D Argentina · Todos los precios en ARS</div>
</footer>

<div class="share-toast" id="share-toast">Link copiado ✓</div>

<div class="lightbox-overlay" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()">
</div>

<script>
const RAW_URL = "https://raw.githubusercontent.com/akasujo/catalogo-3d/main/data.json";

function fmt(n) { return "$" + Math.round(n).toLocaleString("es-AR"); }

function getParam(key) {
  return new URLSearchParams(window.location.search).get(key);
}

function openLightbox(src, alt) {
  const lb = document.getElementById("lightbox");
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox-img").alt = alt;
  lb.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
  document.body.style.overflow = "";
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });

function shareProduct() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const t = document.getElementById("share-toast");
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
  });
}

async function loadAndRender() {
  const id = parseInt(getParam("id"));
  if (!id) { renderNotFound(); return; }

  try {
    const res = await fetch(RAW_URL + "?t=" + Date.now());
    if (!res.ok) throw new Error();
    const data = await res.json();
    const productos = data.productos || [];
    const p = productos.find(x => x.id === id);
    if (!p) { renderNotFound(); return; }

    // Update meta tags
    document.title = p.nombre + " — rems. Impresión 3D";
    document.getElementById("og-title").setAttribute("content", p.nombre);
    document.getElementById("og-description").setAttribute("content", p.descripcion || "");
    if (p.foto) document.getElementById("og-image").setAttribute("content", p.foto);

    // Stock
    const s = p.stockUnidades;
    let stockLabel, stockClass;
    if (s === undefined || s === null) { stockLabel = "En stock"; stockClass = "stock-en-stock"; }
    else if (s === 0) { stockLabel = "Sin stock"; stockClass = "stock-sin-stock"; }
    else if (s === 1) { stockLabel = "Última unidad"; stockClass = "stock-sin-stock"; }
    else { stockLabel = "En stock"; stockClass = "stock-en-stock"; }

    // Badge nuevo
    const isNew = p.fechaAlta && (Date.now() - new Date(p.fechaAlta).getTime()) < 7 * 24 * 60 * 60 * 1000;
    const newBadge = isNew ? `<div class="badge-new">Nuevo</div>` : "";

    // WhatsApp
    const wspMsg = encodeURIComponent("Hola! Me interesa el producto: " + p.nombre);
    const wspURL = "https://wa.me/5491170650288?text=" + wspMsg;

    // Image
    const imgHTML = p.foto
      ? `<img src="${p.foto}" alt="${p.nombre}" onclick="openLightbox('${p.foto}', '${p.nombre}')">`
      : `<div class="product-img-placeholder">🖨️</div>`;

    // Related products (same tag, exclude current)
    const related = productos.filter(x => x.tag === p.tag && x.id !== p.id).slice(0, 3);
    const relatedHTML = related.length ? `
      <div class="related-section">
        <div class="related-title">Productos relacionados</div>
      </div>
      <div class="related-grid">
        ${related.map(r => `
          <a href="producto.html?id=${r.id}" class="related-card">
            <div class="related-img">${r.foto ? `<img src="${r.foto}" alt="${r.nombre}">` : "🖨️"}</div>
            <div class="related-name">${r.nombre}</div>
            <div class="related-price">${fmt(r.precio)}</div>
          </a>`).join("")}
      </div>` : "";

    document.getElementById("content").innerHTML = `
      <div class="product-wrap">
        <div class="product-img-wrap">
          ${newBadge}
          ${imgHTML}
        </div>
        <div class="product-info">
          <div class="product-tag">${p.tag}</div>
          <div class="product-name">${p.nombre}</div>
          ${p.descripcion ? `<div class="product-desc">${p.descripcion}</div>` : ""}
          <hr class="product-divider">
          <div class="product-price-row">
            <span class="price-label">Precio</span>
            ${p.descuento && p.descuentoFecha && new Date(p.descuentoFecha) >= new Date()
              ? `<span class="price-original">${fmt(p.precio)}</span>
                 <span class="price-discount-badge">-${fmt(p.descuento)}</span>
                 <span class="price-val">${fmt(p.precio - p.descuento)}</span>`
              : `<span class="price-val">${fmt(p.precio)}</span>`}
          </div>
          ${p.descuento && p.descuentoFecha && new Date(p.descuentoFecha) >= new Date()
            ? `<div class="price-expiry">Oferta válida hasta ${p.descuentoFecha}</div>`
            : ""}
          <div class="stock-badge ${stockClass}">${stockLabel}</div>
          <a href="${wspURL}" target="_blank" class="btn-wsp">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Consultar por WhatsApp
          </a>
          <button class="btn-share" onclick="shareProduct()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
            Compartir producto
          </button>
        </div>
      </div>
      ${relatedHTML}`;

  } catch(e) {
    renderNotFound();
  }
}

function renderNotFound() {
  document.getElementById("content").innerHTML = `
    <div class="not-found">
      <p>Producto no encontrado.</p>
      <a href="catalogo.html" class="btn-back">← Volver al catálogo</a>
    </div>`;
}

loadAndRender();
</script>
</body>
</html>
