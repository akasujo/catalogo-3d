<title>rems. · Impresión 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #E8E6E1;
    --border: #C8C4BC;
    --text: #111111;
    --muted: #888880;
    --white: #F2F0EB;
    --green: #25D366;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'Barlow',sans-serif;
    min-height:100vh; display:flex; flex-direction:column;
  }

  .page {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:48px 32px; text-align:center;
  }

  .eyebrow {
    font-size:11px; letter-spacing:0.22em; text-transform:uppercase;
    color:var(--muted); margin-bottom:16px;
  }

  .brand {
    font-family:'Barlow Condensed',sans-serif; font-weight:900;
    font-size:clamp(80px,18vw,180px); line-height:0.85;
    text-transform:uppercase; margin-bottom:8px;
  }

  .tagline {
    font-size:13px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--muted); margin-bottom:56px;
  }

  .buttons {
    display:grid; grid-template-columns:1fr 1fr;
    gap:12px; width:100%; max-width:520px;
  }

  .btn {
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:8px;
    padding:32px 24px; text-decoration:none;
    border:2px solid var(--text); color:var(--text);
    font-family:'Barlow Condensed',sans-serif;
    transition:all 0.15s; cursor:pointer;
  }
  .btn:hover { background:var(--text); color:var(--white); }

  .btn-primary { background:var(--text); color:var(--white); }
  .btn-primary:hover { background:#333; border-color:#333; }

  .btn-icon { font-size:28px; line-height:1; }
  .btn-label { font-weight:900; font-size:22px; letter-spacing:0.04em; text-transform:uppercase; }
  .btn-sub { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; opacity:0.6; font-family:'Barlow',sans-serif; font-weight:400; }

  .social-row {
    display:flex; gap:16px; margin-top:48px; align-items:center;
  }
  .social-link {
    display:inline-flex; align-items:center; gap:6px;
    color:var(--muted); font-size:11px; letter-spacing:0.1em;
    text-transform:uppercase; text-decoration:none; transition:color 0.15s;
  }
  .social-link:hover { color:var(--text); }
  .social-link svg { width:14px; height:14px; fill:currentColor; }

  footer {
    border-top:1px solid var(--border); padding:20px 32px;
    color:var(--muted); font-size:10px; letter-spacing:0.08em;
    text-transform:uppercase; text-align:center;
  }

  @media(max-width:480px) {
    .buttons { grid-template-columns:1fr; max-width:320px; }
    .brand { font-size:clamp(72px,22vw,140px); }
  }
</style>
</head>
