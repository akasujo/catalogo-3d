<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo — Impresión 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #E8E6E1;
    --bg2: #DEDAD4;
    --border: #C8C4BC;
    --text: #111111;
    --muted: #888880;
    --green: #2A6B3A;
    --red: #8B2020;
    --white: #F2F0EB;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; min-height:100vh; }
  .container { max-width:1080px; margin:0 auto; padding:0 32px; }

  header { padding:56px 0 40px; border-bottom:2px solid var(--text); }
  .header-inner { display:flex; align-items:flex-end; justify-content:space-between; gap:32px; flex-wrap:wrap; }
  .brand-eyebrow { font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .brand-title { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:clamp(64px,10vw,120px); line-height:0.85; text-transform:uppercase; }
  .brand-title .accent { display:block; font-weight:300; font-size:0.38em; letter-spacing:0.05em; color:var(--muted); font-family:'Barlow',sans-serif; text-transform:uppercase; margin-top:6px; }

  .header-right { display:flex; flex-direction:column; align-items:flex-end; gap:12px; }
  .contact-info { text-align:right; }
  .contact-info p { font-size:12px; color:var(--muted); line-height:1.8; }
  .contact-info strong { color:var(--text); font-weight:500; }

  .stats-bar { display:grid; grid-template-columns:repeat(3,1fr); border:1px solid var(--border); border-top:2px solid var(--text); margin:40px 0; background:var(--white); }
  .stat { padding:20px 24px; border-right:1px solid var(--border); }
  .stat:last-child { border-right:none; }
  .stat-value { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:32px; line-height:1; }
  .stat-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.12em; margin-top:5px; }

  .section-header { display:flex; align-items:baseline; justify-content:space-between; border-top:2px solid var(--text); padding-top:12px; margin-bottom:24px; margin-top:40px; }
  .section-title { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:48px; text-transform:uppercase; line-height:1; }

  .filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
  .filter-btn { background:transparent; border:1px solid var(--border); color:var(--muted); font-family:'Barlow',sans-serif; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; padding:6px 14px; cursor:pointer; transition:all 0.15s; }
  .filter-btn:hover, .filter-btn.active { background:var(--text); border-color:var(--text); color:var(--white); }

  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--border); border:1px solid var(--border); margin-bottom:64px; }

  .card { background:var(--white); padding:28px 24px 24px; position:relative; transition:background 0.15s; cursor:default; }
  .card:hover { background:var(--bg2); }

  .card-img-wrap { width:100%; aspect-ratio:4/3; background:var(--bg); margin-bottom:16px; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .card-img-wrap img { width:100%; height:100%; object-fit:cover; }
  .card-img-placeholder { font-size:32px; opacity:0.3; }

  .card-tag { font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
  .card-name { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:20px; text-transform:uppercase; line-height:1.1; margin-bottom:16px; letter-spacing:0.01em; }

  .card-price-row { display:flex; align-items:baseline; justify-content:space-between; border-top:1px solid var(--border); padding-top:14px; }
  .price-label { font-size:9px; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); }
  .price-val { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:28px; color:var(--green); line-height:1; }

  .no-results { grid-column:1/-1; padding:48px; text-align:center; color:var(--muted); font-size:13px; letter-spacing:0.05em; text-transform:uppercase; background:var(--white); }

  footer { border-top:1px solid var(--border); padding:24px 0; color:var(--muted); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; }

  @media(max-width:700px) {
    .grid { grid-template-columns:1fr; }
    .stats-bar { grid-template-columns:1fr 1fr; }
    .header-inner { flex-direction:column; align-items:flex-start; }
    .header-right { align-items:flex-start; }
  }

  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .card { animation:fadeIn 0.3s ease both; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-inner">
      <div class="brand">
        <div class="brand-eyebrow">Emprendimiento · Damián · Argentina</div>
        <div class="brand-title">
          CATÁLOGO
          <span class="accent">Impresión 3D · Bambu A1 Combo</span>
        </div>
      </div>
      <div class="header-right">
        <div class="contact-info" id="contact-info"></div>
      </div>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value" id="stat-productos">—</div>
      <div class="stat-label">Productos</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-categorias">—</div>
      <div class="stat-label">Categorías</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-desde">—</div>
      <div class="stat-label">Desde</div>
    </div>
  </div>

  <div class="section-header">
    <span class="section-title">PRODUCTOS</span>
  </div>

  <div class="filter-bar" id="filter-bar"></div>
  <div class="grid" id="grid"></div>
</div>

<footer>
  <div class="container">
    Catálogo · Impresión 3D Argentina · Todos los precios en ARS
  </div>
</footer>

<script>
const STORAGE_KEY = "catalogo_productos";
const CONFIG_KEY  = "catalogo_config";

const DEFAULT_PRODUCTS = [
  { id:1, nombre:"Llavero Copa del Mundo 2026",    tag:"Temporada · Mundial", precio:1250,  foto:"" },
  { id:2, nombre:"Caja Anotadora Truco",           tag:"Juegos de mesa",      precio:9500,  foto:"" },
  { id:3, nombre:"Copa del Mundo 15cm",            tag:"Temporada · Mundial", precio:6000,  foto:"" },
  { id:4, nombre:"Copa del Mundo 20cm",            tag:"Temporada · Mundial", precio:15000, foto:"" },
  { id:5, nombre:"Copa del Mundo 25cm",            tag:"Temporada · Mundial", precio:25000, foto:"" },
  { id:6, nombre:"Caja de Figuritas Mundial 2026", tag:"Temporada · Mundial", precio:7500,  foto:"" },
];

const DEFAULT_CONFIG = { contacto: "", whatsapp: "" };

function load() {
  try { const s=localStorage.getItem(STORAGE_KEY); return s?JSON.parse(s):[...DEFAULT_PRODUCTS]; }
  catch(e) { return [...DEFAULT_PRODUCTS]; }
}

function loadConfig() {
  try { const s=localStorage.getItem(CONFIG_KEY); return s?JSON.parse(s):{...DEFAULT_CONFIG}; }
  catch(e) { return {...DEFAULT_CONFIG}; }
}

function fmt(n) { return "$"+Math.round(n).toLocaleString("es-AR"); }

let productos = load();
let filtroActivo = "Todos";

function getTags() {
  const tags = [...new Set(productos.map(p=>p.tag))];
  return ["Todos", ...tags];
}

function renderFilters() {
  const bar = document.getElementById("filter-bar");
  bar.innerHTML = "";
  getTags().forEach(tag => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (tag === filtroActivo ? " active" : "");
    btn.textContent = tag;
    btn.onclick = () => { filtroActivo = tag; renderFilters(); renderCards(); };
    bar.appendChild(btn);
  });
}

function renderCards() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const filtered = filtroActivo === "Todos" ? productos : productos.filter(p=>p.tag===filtroActivo);

  if (!filtered.length) {
    grid.innerHTML = `<div class="no-results">No hay productos en esta categoría</div>`;
    return;
  }

  filtered.forEach((p, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = (i * 0.05) + "s";
    const imgHTML = p.foto
      ? `<img src="${p.foto}" alt="${p.nombre}">`
      : `<div class="card-img-placeholder">🖨️</div>`;
    card.innerHTML = `
      <div class="card-img-wrap">${imgHTML}</div>
      <div class="card-tag">${p.tag}</div>
      <div class="card-name">${p.nombre}</div>
      <div class="card-price-row">
        <span class="price-label">Precio</span>
        <span class="price-val">${fmt(p.precio)}</span>
      </div>`;
    grid.appendChild(card);
  });
}

function updateStats() {
  const tags = [...new Set(productos.map(p=>p.tag))];
  const minPrecio = productos.length ? Math.min(...productos.map(p=>p.precio)) : 0;
  document.getElementById("stat-productos").textContent = productos.length;
  document.getElementById("stat-categorias").textContent = tags.length;
  document.getElementById("stat-desde").textContent = fmt(minPrecio);
}

function renderContact() {
  const cfg = loadConfig();
  const el = document.getElementById("contact-info");
  if (cfg.contacto || cfg.whatsapp) {
    el.innerHTML = `
      ${cfg.contacto ? `<p><strong>Contacto:</strong> ${cfg.contacto}</p>` : ""}
      ${cfg.whatsapp ? `<p><strong>WhatsApp:</strong> ${cfg.whatsapp}</p>` : ""}
    `;
  }
}

// Poll for changes (in case admin is open in another tab)
setInterval(() => {
  const fresh = load();
  if (JSON.stringify(fresh) !== JSON.stringify(productos)) {
    productos = fresh;
    renderFilters();
    renderCards();
    updateStats();
  }
}, 2000);

renderContact();
renderFilters();
renderCards();
updateStats();
</script>
</body>
</html>
